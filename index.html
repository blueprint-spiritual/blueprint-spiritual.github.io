<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisis Weton Spiritual Eksklusif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gray-100">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-xl border border-gray-100 my-10 relative z-10">
        <h1 class="text-3xl font-extrabold text-center text-amber-600 tracking-wide mb-2 uppercase">
            Ramalan & Analisis Weton Agung
        </h1>
        <p class="text-sm text-gray-600 text-center mb-8">Buka rahasia takdir & rezeki Anda.</p>

        <form id="masterForm" class="space-y-5">
            <!-- ACCESS KEY LU UDAH GUE TANAM -->
            <input type="hidden" name="access_key" value="57b72712-a128-4599-b80b-42ccc142c5c8">
            <input type="hidden" name="subject" value="Pesanan Weton Baru">
            <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

            <div id="step1" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Nama Lengkap</label>
                    <input type="text" id="username" name="Nama Lengkap" required placeholder="Masukkan nama lengkap"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Tanggal Kelahiran</label>
                    <input type="date" id="birthdate" name="Tanggal Lahir" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Pilihan Pasaran Weton</label>
                    <select id="weton" name="Weton Pasaran" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl bg-white">
                        <option value="" disabled selected>-- Pilih --</option>
                        <option value="Legi">Legi</option>
                        <option value="Pahing">Pahing</option>
                        <option value="Pon">Pon</option>
                        <option value="Wage">Wage</option>
                        <option value="Kliwon">Kliwon</option>
                    </select>
                </div>
                <div class="bg-amber-50 border border-amber-200 p-4 rounded-xl text-center">
                    <label class="block text-xs font-bold text-amber-800 uppercase mb-2">Langkah Pembayaran DANA</label>
                    <button type="button" id="payDanaBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-xl text-sm">
                        🔹 Klik di Sini untuk Bayar via DANA 🔹
                    </button>
                    <p class="text-[11px] text-gray-500 mt-2">Bayar dulu, screenshot, balik lagi kesini</p>
                </div>
            </div>

            <div id="step2" style="display: none;" class="space-y-5 border-t pt-5">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Upload Bukti Pembayaran</label>
                    <label class="flex flex-col items-center justify-center w-full px-4 py-4 bg-white border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:bg-gray-50">
                        <span id="uploadLabel" class="text-xs font-bold text-gray-600">KLIK UNTUK PILIH SCREENSHOT</span>
                        <span id="fileNameInfo" class="text-[11px] text-gray-400 mt-1"></span>
                        <input type='file' id="screenshot" name="Bukti Screenshot" accept="image/*" class="hidden" required />
                    </label>
                    <span id="checkScreenshot" style="display: none;" class="text-green-600 text-sm font-bold mt-1 block">✅ File terpilih</span>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Alamat Email Anda</label>
                    <input type="email" id="clientEmail" name="Email Client" required placeholder="nama@email.com"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none">
                    <span id="checkEmail" style="display: none;" class="text-green-600 text-xs font-bold">✅ Email valid</span>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Catatan Tambahan</label>
                    <textarea id="comment" name="Komentar Tambahan" rows="3" placeholder="Catatan..."
                              class="w-full px-4 py-2.5 border border-gray-300 rounded-xl resize-none"></textarea>
                </div>

                <button type="submit" id="submitBtn" disabled
                        class="w-full bg-gray-400 text-white font-bold py-3 px-4 rounded-xl transition uppercase text-sm shadow-md">
                    Kunci Semua Informasi & Analis
                </button>
                <p id="statusInfo" class="text-[11px] text-center text-gray-400">Lengkapi semua kolom agar tombol aktif</p>
            </div>
        </form>

        <div id="infoSuccess" style="display: none;" class="mt-6 bg-green-50 border border-green-200 p-4 rounded-xl text-center">
            <p class="text-green-800 font-bold text-sm">🎉 Sukses! Data + screenshot terkirim ke email lu!</p>
            <p class="text-green-600 text-xs mt-2">Cek inbox Web3Forms / email lu</p>
        </div>
    </div>

    <!-- TOMBOL DANA ANTI SCRAPER + ANTI GAGAL -->
    <script>
    (function(){
        const btn = document.getElementById('payDanaBtn');
        const step2 = document.getElementById('step2');
        if(btn){
            btn.addEventListener('click', function(e){
                e.preventDefault();
                const link = atob("aHR0cHM6Ly9yYi5neS9kOGE5emY=");
                window.open(link, '_blank');
                step2.style.display = 'block';
                step2.scrollIntoView({behavior:'smooth'});
            });
        }
    })();
    </script>

    <script src="script.js"></script>
</body>
    </html>
